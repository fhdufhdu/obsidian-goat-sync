name: Build and publish

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  actions: read
  contents: write

env:
  PLUGIN_ARTIFACT_NAME: obsidian-goat-sync-brat
  DOCKERHUB_REPOSITORY: obsidian-goat-sync

jobs:
  plugin:
    name: Build BRAT plugin assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be unprefixed semantic versions like 1.0.0."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Upload BRAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_ARTIFACT_NAME }}
          if-no-files-found: error
          path: |
            build/brat/main.js
            build/brat/manifest.json
            build/brat/styles.css

      - name: Attach BRAT assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            build/brat/main.js
            build/brat/manifest.json
            build/brat/styles.css

  docker:
    name: Publish server image to Docker Hub
    runs-on: ubuntu-latest
    needs: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be unprefixed semantic versions like 1.0.0."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=tag

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
          short-description: Self-hosted Obsidian Goat Sync server
          readme-filepath: DOCKERHUB.md
